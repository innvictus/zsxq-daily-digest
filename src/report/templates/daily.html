<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识星球日报 - {{ date }}</title>
<style>
  :root {
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #999;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --border: #e5e7eb;
    --table-stripe: #f9fafb;
    --table-header: #f1f5f9;
    --quote-bg: #fafbfc;
    --quote-border: #2563eb;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1117;
      --card-bg: #1a1d27;
      --text: #e5e7eb;
      --text-secondary: #9ca3af;
      --text-tertiary: #6b7280;
      --accent: #60a5fa;
      --accent-light: #1e293b;
      --border: #2d3148;
      --table-stripe: #1e2235;
      --table-header: #252940;
      --quote-bg: #1a1d27;
      --quote-border: #60a5fa;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                 "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
                 "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    padding: 48px 24px 80px;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 820px; margin: 0 auto; }

  /* ===== Header ===== */
  .report-header {
    text-align: center;
    padding: 48px 0 32px;
  }
  .report-header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }
  .report-header .date-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-size: 15px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .report-header .date-row .dot {
    width: 4px; height: 4px;
    background: var(--text-tertiary);
    border-radius: 50%;
  }
  .report-header .meta {
    font-size: 13px;
    color: var(--text-tertiary);
    margin-top: 6px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 32px;
  }

  /* ===== Stats Banner ===== */
  .stats-banner {
    text-align: center;
    padding: 14px 24px;
    margin-bottom: 28px;
    background: var(--accent-light);
    border-radius: 10px;
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  /* ===== Sections ===== */
  .report-section {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 36px 40px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .report-section h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 24px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--accent);
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .report-section h3 {
    font-size: 16px;
    font-weight: 600;
    margin: 28px 0 12px;
    padding-left: 10px;
    border-left: 3px solid var(--accent);
  }

  .report-section p {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.8;
  }

  /* ===== Data Tables ===== */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin: 12px 0 20px;
  }
  .data-table thead th {
    background: var(--table-header);
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 12px 16px;
    text-align: left;
    border-bottom: 2px solid var(--border);
  }
  .data-table thead th.num { text-align: right; }
  .data-table tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.6;
  }
  .data-table tbody tr:nth-child(even) { background: var(--table-stripe); }
  .data-table tbody td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 13px;
  }
  .data-table .rank {
    width: 48px;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
    color: var(--accent);
  }

  /* ===== Article Cards ===== */
  .article-card {
    padding: 20px 24px;
    margin-bottom: 14px;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--border);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .article-card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .article-card .title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .article-card .summary {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 12px;
  }
  .article-card .card-meta {
    font-size: 12px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .article-card .card-meta .meta-left {
    display: flex;
    gap: 16px;
  }

  /* ===== Source Link Button ===== */
  .source-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 14px;
    background: var(--accent);
    color: #ffffff !important;
    text-decoration: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .source-link:hover { opacity: 0.85; }

  /* ===== Blockquote ===== */
  blockquote {
    border-left: 3px solid var(--quote-border);
    padding: 14px 20px;
    margin: 16px 0;
    background: var(--quote-bg);
    border-radius: 0 8px 8px 0;
    font-size: 15px;
    line-height: 1.8;
  }
  blockquote .author {
    display: block;
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-tertiary);
  }

  /* ===== Highlights ===== */
  .highlight-box {
    background: var(--accent-light);
    border-radius: 10px;
    padding: 22px 24px;
    margin-bottom: 18px;
    font-size: 15px;
    line-height: 1.8;
  }

  /* ===== Footer ===== */
  .report-footer {
    text-align: center;
    padding: 48px 0 24px;
    color: var(--text-tertiary);
    font-size: 12px;
    letter-spacing: 0.3px;
  }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    body { padding: 24px 12px 60px; }
    .report-header h1 { font-size: 26px; }
    .report-section { padding: 24px 20px; }
    .article-card { padding: 16px; }
    .data-table { font-size: 13px; }
    .data-table thead th,
    .data-table tbody td { padding: 8px 10px; }
    .report-header .date-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="report-header">
    <h1>知识星球日报</h1>
    <div class="date-row">
      <span>{{ date }}</span>
      <span class="dot"></span>
      <span>{{ stats.posts }} 篇帖子</span>
      <span class="dot"></span>
      <span>{{ stats.pdfs }} 份PDF</span>
      <span class="dot"></span>
      <span>{{ stats.images }} 张图片</span>
    </div>
  </header>

  <hr class="divider">

  {{ content | safe }}

  <footer class="report-footer">
    ZSXQ Daily Digest &middot; AI 生成 &middot; 仅供参考不构成投资建议
  </footer>

</div>
</body>
</html>
