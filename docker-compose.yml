services:
  zsxq-daily:
    build: .
    container_name: zsxq-daily-digest
    restart: unless-stopped
    environment:
      - RUN_HOUR=1          # 每天凌晨1点执行
      - RUN_MINUTE=0
      - RUN_ON_START=false  # 启动时是否立即执行一次
      - TZ=Asia/Shanghai
    volumes:
      # 极空间挂载: 把 output 和 data 映射到NAS存储
      - ./output:/app/output
      - ./data:/app/data
      - ./logs:/app/logs
      # 配置文件(只读)
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./config/groups.yaml:/app/config/groups.yaml:ro
      - ./config/rules.yaml:/app/config/rules.yaml:ro
